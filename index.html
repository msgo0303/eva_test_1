<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ID 인식 테스트</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
            background-color: #f5f5f7;
            color: #333;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .status {
            font-weight: bold;
            margin-top: 10px;
        }

        .success {
            color: #2e7d32;
        }

        .fail {
            color: #d32f2f;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>📱 텔레그램 ID 인식 테스트</h2>
        <p id="my-id">내 ID 추출 중...</p>
        <hr>
        <p id="result-status" class="status">구글 시트 연동 조회 중...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ⚠️ 본인의 GAS 웹앱 URL (/exec로 끝나는 주소)로 변경해 주세요.
        const GAS_URL = "YOUR_GAS_WEBAPP_URL_HERE";

        async function testUserAuth() {
            const initData = tg.initData;

            if (!initData) {
                document.getElementById('my-id').innerText = "⚠️ 텔레그램 모바일 앱에서 접속해 주세요.";
                document.getElementById('result-status').innerText = "대기 중";
                return;
            }

            try {
                const response = await fetch(`${GAS_URL}?initData=${encodeURIComponent(initData)}`);
                const data = await response.json();

                document.getElementById('my-id').innerText = `내 텔레그램 ID: ${data.userId || "추출 실패"}`;

                if (data.isRegistered) {
                    document.getElementById('result-status').className = "status success";
                    document.getElementById('result-status').innerText = `✅ 등록된 사용자입니다! (이름: ${data.userName})`;
                } else {
                    document.getElementById('result-status').className = "status fail";
                    document.getElementById('result-status').innerText = "❌ UserDB에 등록되지 않은 ID입니다.";
                }

            } catch (err) {
                document.getElementById('result-status').className = "status fail";
                document.getElementById('result-status').innerText = `⚠️ 통신 에러 발생: ${err.message}`;
            }
        }

        testUserAuth();
    </script>
</body>

</html>
